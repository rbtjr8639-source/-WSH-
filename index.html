<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2028 학과별 권장과목 찾기 (출처: 대교협, 2차 제작: 오창고 김태연)</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --line:#e6eaf2; --ink:#16203a; --sub:#69748c;
    --brand:#3b5bdb; --brand2:#5c7cfa; --soft:#edf1ff; --soft2:#dfe7ff;
    --core:#0b7285; --core-bg:#d8f3f8; --rec:#b8860b; --rec-bg:#fbf1d6;
    --shadow:0 2px 8px rgba(22,32,58,.07); --shadow2:0 8px 28px rgba(22,32,58,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;-webkit-text-size-adjust:100%}
  .wrap{max-width:840px;margin:0 auto;padding:0 16px 90px}
  .hero{background:linear-gradient(135deg,#3b5bdb 0%,#6741d9 100%);color:#fff;padding:22px 0 64px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.08)}
  .hero .wrap{padding-bottom:0}
  .h-title{font-size:21px;font-weight:800;letter-spacing:-.4px}
  .h-sub{font-size:12.5px;opacity:.9;margin-top:3px}
  .steps{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap}
  .step{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;opacity:.5;transition:.2s}
  .step.on{opacity:1}
  .step .num{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:10px}
  .step.on .num{background:#fff;color:var(--brand)}
  .step .arr{opacity:.4;font-size:10px}
  .panel{margin-top:-44px;position:relative;z-index:5}
  .searchcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow2);padding:16px}
  .search{position:relative}
  .search input{width:100%;padding:14px 14px 14px 44px;font-size:15.5px;border:1.5px solid var(--line);border-radius:13px;background:#fbfcff;outline:none;transition:border .15s}
  .search input:focus{border-color:var(--brand);background:#fff}
  .search svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--sub)}
  .hints{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap}
  .hint{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;background:var(--soft);color:var(--brand);cursor:pointer;border:none;transition:.12s}
  .hint:hover{background:var(--soft2)}
  .crumb{display:flex;align-items:center;gap:9px;margin:18px 2px 4px;flex-wrap:wrap}
  .back{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--brand);background:var(--soft);border:none;padding:8px 13px;border-radius:999px;cursor:pointer}
  .back:hover{background:var(--soft2)}
  .crumb .cur{font-size:13px;color:var(--sub);font-weight:600}
  .filters{display:flex;gap:7px;margin:12px 0 4px;flex-wrap:wrap;align-items:center}
  .flabel{font-size:11.5px;font-weight:700;color:var(--sub);margin-right:2px}
  .chip{padding:7px 13px;font-size:12.5px;font-weight:600;border:1.5px solid var(--line);border-radius:999px;background:var(--card);color:var(--sub);cursor:pointer;transition:.12s;white-space:nowrap}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
  select{padding:8px 12px;font-size:12.5px;border:1.5px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink);cursor:pointer;font-weight:600;max-width:62%}
  .sec{font-size:14px;font-weight:800;margin:22px 2px 11px;display:flex;align-items:center;gap:7px}
  .sec .n{font-size:12px;font-weight:600;color:var(--sub)}
  .count{font-size:12.5px;color:var(--sub);margin:14px 2px 8px}
  .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:6px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;box-shadow:var(--shadow);transition:transform .1s,box-shadow .15s,border-color .15s}
  .mcard:hover{transform:translateY(-2px);box-shadow:var(--shadow2);border-color:#bcccff}
  .mcard .nm{font-size:14.5px;font-weight:700;letter-spacing:-.2px;line-height:1.35}
  .mcard .col{font-size:11px;color:var(--sub);margin-top:2px}
  .mcard .cnt{font-size:11.5px;color:var(--brand);font-weight:700;margin-top:6px}
  .mcard .pv{font-size:11px;color:var(--sub);margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .relrow{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 8px;-webkit-overflow-scrolling:touch}
  .relchip{flex:0 0 auto;max-width:180px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:10px 13px;cursor:pointer;transition:.12s}
  .relchip:hover{border-color:#bcccff;background:#fbfcff}
  .relchip .rn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .relchip .rc{font-size:11px;color:var(--sub);margin-top:2px}
  .summary{background:linear-gradient(135deg,#1e40af,#4c6ef5);color:#fff;border-radius:18px;padding:18px;margin-top:8px;box-shadow:0 6px 20px rgba(59,91,219,.28)}
  .summary .st{font-size:12px;font-weight:600;opacity:.85}
  .summary .sh{font-size:17px;font-weight:800;margin:2px 0 3px;letter-spacing:-.2px}
  .summary .sd{font-size:12px;opacity:.9;margin-bottom:13px;line-height:1.5}
  .agg{display:flex;flex-direction:column;gap:9px}
  .agg-row{display:flex;align-items:center;gap:10px}
  .agg-name{flex:0 0 96px;font-size:13.5px;font-weight:700}
  .agg-name b{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:5px;vertical-align:middle}
  .agg-name b.c{background:#fff;color:var(--core)} .agg-name b.r{background:rgba(255,255,255,.82);color:var(--rec)}
  .agg-track{flex:1;height:7px;background:rgba(255,255,255,.22);border-radius:4px;overflow:hidden}
  .agg-fill{height:100%;background:#fff;border-radius:4px}
  .agg-pct{flex:0 0 36px;text-align:right;font-size:12px;font-weight:700}
  .agg-note{font-size:11px;opacity:.82;margin-top:12px;line-height:1.5}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s}
  .card:active{transform:scale(.995)}
  .card:hover{border-color:#cdd8f5}
  .ctop{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .ctop .uni{font-size:13px;color:var(--brand);font-weight:800}
  .ctop .loc{font-size:11px;color:var(--sub);font-weight:600;background:var(--soft);padding:2px 8px;border-radius:6px}
  .cmaj{font-size:16px;font-weight:700;margin-top:5px;letter-spacing:-.2px;line-height:1.35}
  .ccol{font-size:11.5px;color:var(--sub);font-weight:500}
  .row{display:flex;gap:8px;margin-top:9px;align-items:flex-start}
  .lab{flex:0 0 50px;font-size:11.5px;font-weight:700;padding-top:3px}
  .lab.core{color:var(--core)} .lab.rec{color:var(--rec)}
  .subs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .sub-tag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px}
  .sub-tag.core{background:var(--core-bg);color:var(--core)} .sub-tag.rec{background:var(--rec-bg);color:var(--rec)}
  .none{font-size:12.5px;color:#9aa4bb;padding-top:3px}
  .empty{text-align:center;padding:54px 20px;color:var(--sub)}
  .empty b{display:block;font-size:15px;color:var(--ink);margin-bottom:5px}
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:var(--bg);width:100%;max-width:840px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:0 16px 40px;animation:up .25s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
  .sheet-h{position:sticky;top:0;background:var(--bg);padding:16px 0 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line)}
  .close{flex:0 0 auto;border:none;background:var(--card);width:34px;height:34px;border-radius:50%;font-size:18px;color:var(--sub);cursor:pointer;box-shadow:var(--shadow);line-height:1}
  .d-uni{font-size:13px;color:var(--brand);font-weight:700}
  .d-maj{font-size:20px;font-weight:800;letter-spacing:-.3px;margin-top:1px;line-height:1.3}
  .d-loc{font-size:12px;color:var(--sub);margin-top:3px}
  .block{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-top:13px}
  .block h3{font-size:13px;font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.core{background:var(--core)} .dot.rec{background:var(--rec)} .dot.sim{background:var(--brand)}
  .note{font-size:13px;color:var(--sub);white-space:pre-line;background:#f7f9fd;border-radius:9px;padding:10px 12px;margin-top:4px}
  .sim-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);cursor:pointer}
  .sim-item:first-of-type{border-top:none}
  .sim-l .su{font-size:11px;color:var(--brand);font-weight:700}
  .sim-l .sm{font-size:14px;font-weight:700}
  .sim-l .ss{font-size:11px;color:var(--sub);margin-top:2px}
  .bar{flex:0 0 auto;display:flex;align-items:center;gap:7px}
  .bar .pct{font-size:11px;font-weight:700;color:var(--brand);width:34px;text-align:right}
  .bar .track{width:46px;height:5px;background:var(--soft2);border-radius:3px;overflow:hidden}
  .bar .fill{height:100%;background:var(--brand);border-radius:3px}
  .legend{font-size:11.5px;color:var(--sub);margin-top:6px;line-height:1.7}
  .helpbtn{margin-top:11px;display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--brand);background:#fff;border:1.5px solid var(--soft2);border-radius:999px;padding:8px 14px;cursor:pointer;transition:.12s}
  .helpbtn:hover{background:var(--soft)}
  .block p{font-size:13px;color:#46506a;line-height:1.65;margin:0}
  .block p b{color:var(--ink)}
  .block p+p{margin-top:7px}
  footer{text-align:center;font-size:11px;color:#9aa4bb;margin-top:26px;padding-bottom:10px}
</style>
</head>

<div class="hero"><div class="wrap">
  <div class="h-title">2028 학과별 권장과목 찾기 <span style="font-size:13px;font-weight:600;opacity:.85">(출처: 대교협, 2차 제작: 오창고 김태연)</span></div>
  <div class="h-sub">희망 학과를 검색하면 관련 학과와 추천 선택과목을 단계별로 안내해요</div>

</div></div>
<div class="wrap">
  <div class="panel"><div class="searchcard">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="q" type="search" placeholder="학과 키워드 검색 (예: 물리, 컴퓨터, 간호, 디자인, 경영)" autocomplete="off">
    </div>
    <div class="hints" id="hints"></div>
    <button class="helpbtn" id="helpBtn">ℹ️ 학과추천 방법 — 어떻게 정해지나요?</button>

  <div id="out"></div>
</div>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
const DATA=JSON.parse(document.getElementById('data').textContent);
const BY_NAME={}; DATA.forEach(d=>{(BY_NAME[d.m]=BY_NAME[d.m]||[]).push(d);});
const NAMES=Object.keys(BY_NAME);
const REGIONS=[...new Set(DATA.map(d=>d.rg))];
const HINTS=['물리','화학','생명','컴퓨터','전자','기계','간호','의예','약학','경영','경제','심리','교육','디자인','건축','수학','국어국문','경찰','반도체','체육'];
let view='search', selMajor=null, fRegion='', fUni='', fQ='';
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const short=m=>{let t=m.replace(/\s*\(.*?\)\s*/g,'').replace(/\s+/g,'');return t.length>7?t.slice(0,7)+'…':t;};

const hEl=document.getElementById('hints');
hEl.innerHTML=HINTS.map(h=>`<button class="hint" data-h="${h}">${h}</button>`).join('');
hEl.onclick=e=>{const b=e.target.closest('.hint');if(!b)return;document.getElementById('q').value=b.dataset.h;fQ=b.dataset.h;goSearch();};
document.getElementById('q').oninput=e=>{fQ=e.target.value.trim();goSearch();};
function goSearch(){view='search';selMajor=null;fUni='';render();}
function setStep(n){[...document.querySelectorAll('.step')].forEach(s=>s.classList.toggle('on',+s.dataset.s<=n));}
function tags(arr,cls){return arr.length?arr.map(s=>`<span class="sub-tag ${cls}">${esc(s)}</span>`).join(''):'<span class="none">계열 적성에 따라 선택</span>';}

function aggregate(recs){
  const total=recs.length||1,cnt={};
  recs.forEach(d=>{const cs=new Set(d.cs);new Set([...d.cs,...d.rs]).forEach(s=>{cnt[s]=cnt[s]||{a:0,c:0};cnt[s].a++;if(cs.has(s))cnt[s].c++;});});
  return Object.entries(cnt).map(([s,o])=>({s,share:o.a/total,coreShare:o.c/o.a})).filter(o=>o.share>=0.15).sort((a,b)=>b.share-a.share).slice(0,8);
}
function summaryHTML(title,recs){
  const agg=aggregate(recs);if(!agg.length)return '';
  const rows=agg.map(o=>{const mc=o.coreShare>=0.5;return `<div class="agg-row">
    <div class="agg-name">${esc(o.s)}<b class="${mc?'c':'r'}">${mc?'핵심':'권장'}</b></div>
    <div class="agg-track"><div class="agg-fill" style="width:${Math.round(o.share*100)}%"></div></div>
    <div class="agg-pct">${Math.round(o.share*100)}%</div></div>`;}).join('');
  const top=agg.slice(0,3).map(o=>o.s).join(' · ');
  const desc=recs.length>1?`이 학과를 운영하는 대학 ${recs.length}곳이 공통으로 추천하는 과목 순서예요.`:`이 학과가 추천하는 과목이에요.`;
  return `<div class="summary"><div class="st">${esc(title)}</div>
    <div class="sh">이런 과목을 선택하면 좋아요</div>
    <div class="sd">${desc} <b>${esc(top)}</b> 위주로 챙기세요.</div>
    <div class="agg">${rows}</div>
    <div class="agg-note">막대 = 추천한 대학 비율 · ‘핵심/권장’은 다수 대학의 분류 기준</div></div>`;
}

/* ---------- SEARCH ---------- */
function renderSearch(){
  const out=document.getElementById('out');setStep(0);
  if(!fQ){
    const all=NAMES.map(m=>({m,recs:BY_NAME[m]})).sort((a,b)=>b.recs.length-a.recs.length);
    out.innerHTML=`<div class="sec">📚 전체 학과 둘러보기 <span class="n">${all.length}개 학과 · 키워드로 검색해 보세요</span></div>`+majorGrid(all.slice(0,60));
    return;
  }
  const q=fQ.toLowerCase();
  const matched=NAMES.filter(m=>(m+' '+(BY_NAME[m][0].col||'')+' '+BY_NAME[m].map(d=>d.u).join(' ')).toLowerCase().includes(q))
    .map(m=>({m,recs:BY_NAME[m]})).sort((a,b)=>b.recs.length-a.recs.length);
  if(!matched.length){out.innerHTML='<div class="empty"><b>‘'+esc(fQ)+'’ 학과를 찾지 못했어요</b>다른 키워드(예: 물리, 간호, 디자인)로 검색해 보세요</div>';return;}
  const mset=new Set(matched.map(o=>o.m)),relScore={};
  matched.forEach(o=>o.recs.forEach(d=>d.sim.forEach(([j,sc])=>{const nm=DATA[j].m;if(mset.has(nm))return;relScore[nm]=Math.max(relScore[nm]||0,sc);})));
  const related=Object.entries(relScore).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([m])=>({m,recs:BY_NAME[m]}));
  let html=`<div class="sec">🔎 ‘${esc(fQ)}’ 관련 학과 <span class="n">${matched.length}개 학과 · 누르면 추천 과목을 볼 수 있어요</span></div>`+majorGrid(matched);
  if(related.length){
    html+=`<div class="sec">🧭 함께 살펴보면 좋은 비슷한 학과 <span class="n">과목 구성이 닮은 학과</span></div><div class="relrow">`+
      related.map(o=>`<div class="relchip" data-m="${encodeURIComponent(o.m)}"><div class="rn">${esc(o.m)}</div><div class="rc">${o.recs.length}개 대학</div></div>`).join('')+`</div>`;
  }
  out.innerHTML=html;
}
function majorGrid(list){
  return `<div class="mgrid">`+list.map(o=>{
    const col=o.recs[0].col?`<div class="col">${esc(o.recs[0].col)}</div>`:'';
    const pv=[...new Set(o.recs.flatMap(d=>d.cs))].slice(0,5).join(', ')||'계열 적성에 따라 선택';
    return `<div class="mcard" data-m="${encodeURIComponent(o.m)}"><div class="nm">${esc(o.m)}</div>${col}<div class="cnt">${o.recs.length}개 대학</div><div class="pv">${esc(pv)}</div></div>`;
  }).join('')+`</div>`;
}

/* ---------- MAJOR ---------- */
function renderMajor(){
  const out=document.getElementById('out');setStep(2);
  const recs=BY_NAME[selMajor]||[];
  const regionsAvail=[...new Set(recs.map(d=>d.rg))];
  const shown=recs.filter(d=>(!fRegion||d.rg===fRegion)&&(!fUni||d.u===fUni));
  const unis=[...new Set(recs.filter(d=>!fRegion||d.rg===fRegion).map(d=>d.u))];
  const col=recs[0].col?` · ${esc(recs[0].col)}`:'';
  let html=`<div class="crumb"><button class="back" id="back">‹ 다른 학과 검색</button><span class="cur">${esc(selMajor)}${col}</span></div>`;
  html+=summaryHTML(`‘${selMajor}’ 지망이라면`,recs);
  html+=`<div class="sec">🏫 개설 대학 선택 <span class="n">${shown.length}곳</span></div>`;
  html+=`<div class="filters"><span class="flabel">지역</span><span class="chip ${fRegion===''?'on':''}" data-r="">전체</span>`+
    REGIONS.filter(r=>regionsAvail.includes(r)).map(r=>`<span class="chip ${fRegion===r?'on':''}" data-r="${r}">${r}</span>`).join('')+`</div>`;
  html+=`<div class="filters"><span class="flabel">대학</span><select id="uniSel"><option value="">전체 대학</option>`+
    unis.map(u=>`<option value="${esc(u)}" ${fUni===u?'selected':''}>${esc(u)}</option>`).join('')+`</select></div>`;
  html+= shown.length?shown.map(uniCard).join(''):'<div class="empty"><b>선택한 조건에 개설 대학이 없어요</b>지역/대학 필터를 바꿔보세요</div>';
  out.innerHTML=html;
  document.getElementById('back').onclick=goSearch;
  const us=document.getElementById('uniSel');if(us)us.onchange=()=>{fUni=us.value;renderMajor();};
}
function uniCard(d){
  const col=d.col?`<span class="ccol"> · ${esc(d.col)}</span>`:'';
  return `<div class="card" data-id="${d.id}">
    <div class="ctop"><span class="uni">${esc(d.u)}</span><span class="loc">${d.rg} · ${esc(d.lc)}</span></div>
    <div class="cmaj">${esc(d.m)}${col}</div>
    <div class="row"><div class="lab core">핵심</div><div class="subs">${tags(d.cs,'core')}</div></div>
    <div class="row"><div class="lab rec">권장</div><div class="subs">${tags(d.rs,'rec')}</div></div>
  </div>`;
}
function render(){ if(view==='major'&&selMajor)renderMajor(); else renderSearch(); window.scrollTo({top:0}); }

document.getElementById('out').addEventListener('click',e=>{
  const mc=e.target.closest('[data-m]');
  if(mc){selMajor=decodeURIComponent(mc.dataset.m);view='major';fUni='';render();return;}
  const rc=e.target.closest('.chip[data-r]');
  if(rc){fRegion=rc.dataset.r;fUni='';render();return;}
  const card=e.target.closest('.card[data-id]');
  if(card){openDetail(+card.dataset.id);return;}
});

/* ---------- detail modal ---------- */
const overlay=document.getElementById('overlay'),sheet=document.getElementById('sheet');
overlay.onclick=e=>{if(e.target===overlay)closeD();};
function closeD(){overlay.classList.remove('show');document.body.style.overflow='';}
function openDetail(id){
  const d=DATA[id], col=d.col?` · ${esc(d.col)}`:'';
  const sim=d.sim.map(([j,sc])=>{const o=DATA[j];return `
    <div class="sim-item" data-id="${j}"><div class="sim-l"><div class="su">${esc(o.u)}</div><div class="sm">${esc(o.m)}</div><div class="ss">${o.rg} ${esc(o.lc)}</div></div>
    <div class="bar"><div class="track"><div class="fill" style="width:${Math.round(sc*100)}%"></div></div><div class="pct">${Math.round(sc*100)}%</div></div></div>`;}).join('');
  sheet.innerHTML=`<div class="sheet-h"><div><div class="d-uni">${esc(d.u)}</div><div class="d-maj">${esc(d.m)}</div><div class="d-loc">${d.rg} · ${esc(d.lc)}${col}</div></div><button class="close" id="cl">&times;</button></div>
    <div class="block"><h3><span class="dot core"></span>핵심과목 <span style="font-weight:500;color:var(--sub)">필수적 이수 권장</span></h3><div class="subs">${tags(d.cs,'core')}</div></div>
    <div class="block"><h3><span class="dot rec"></span>권장과목 <span style="font-weight:500;color:var(--sub)">가급적 이수 권장</span></h3><div class="subs">${tags(d.rs,'rec')}</div></div>
    ${d.n&&d.n!=='-'?`<div class="block"><h3>📌 비고 · 세부조건</h3><div class="note">${esc(d.n)}</div></div>`:''}
    ${sim?`<div class="block"><h3><span class="dot sim"></span>비슷한 학과 목록</h3>${sim}<div class="legend">유사도 기준 참고용 · 진로를 폭넓게 고민할 때 활용하세요</div></div>`:''}`;
  sheet.querySelector('#cl').onclick=closeD;
  const nav=nid=>{openDetail(nid);};
  sheet.querySelectorAll('.sim-item').forEach(el=>el.onclick=()=>nav(+el.dataset.id));
  overlay.classList.add('show');document.body.style.overflow='hidden';sheet.scrollTop=0;
}
function openHelp(){
  sheet.innerHTML=`
    <div class="sheet-h"><div><div class="d-uni">도움말</div><div class="d-maj">학과추천은 이렇게 정해져요</div></div><button class="close" id="cl">&times;</button></div>
    <div class="block"><h3>🔎 무엇을 비교하나요?</h3><p>각 학과가 “들으면 좋다”고 안내하는 <b>핵심과목·권장과목</b>을 서로 비교해요.</p></div>
    <div class="block"><h3>🤝 어떻게 ‘비슷한 학과’로 보나요?</h3><p>두 학과가 추천하는 과목이 많이 겹칠수록 비슷한 학과로 봐요.</p><p>예를 들어 두 학과가 모두 <b>화학·생명과학·수학</b>을 추천하면 서로 비슷하다고 판단해요.</p></div>
    <div class="block"><h3>📊 옆에 보이는 %는 무슨 뜻인가요?</h3><p>추천 과목이 겹치는 정도예요. <b>100%</b>면 추천 과목 구성이 거의 똑같다는 뜻이에요.</p></div>
    <div class="block"><h3>⚖️ 한 가지 규칙</h3><p>꼭 들으라는 <b>핵심과목</b>을 더 중요하게 봐요. 또 여러 학과가 다 추천하는 흔한 과목(국어·영어 등)보다, <b>특정 학과만 추천하는 과목</b>이 ‘닮음’을 더 잘 보여줘요.</p></div>
    <div class="block"><h3>💡 참고하세요</h3><p>이건 공식 계열 분류가 아니라 <b>과목 구성이 닮은 정도</b>를 보여주는 참고 정보예요.</p><p>“이 과목들을 들으면 이런 학과도 함께 고려할 수 있어요”라는 <b>탐색용 힌트</b>로 활용하세요.</p></div>`;
  sheet.querySelector('#cl').onclick=closeD;
  overlay.classList.add('show');document.body.style.overflow='hidden';sheet.scrollTop=0;
}
document.getElementById('helpBtn').onclick=openHelp;
render();
</script>
</body>
</html>
